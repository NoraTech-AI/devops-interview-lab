apiVersion: apps/v1
kind: Deployment
 

metadata:
  name: demo-app
  namespace: config-lab


spec:
  replicas: 1
 
  selector:
    matchLabels:
      app: demo-app
 
  template:
    metadata:
      labels:
        app: demo-app
    

    spec:
      containers:
      - name: demo-app
        image: nginx:1.29

        env:
        - name: APP_ENV
          valueFrom:
            configMapKeyRef: 
               name: app-config
               key: APP_ENV
        

        - name: APP_NAME
          valueFrom:
             configMapKeyRef:
                name: app-config
                key: APP_NAME
        


        - name: DB_USER
          valueFrom:
             secretKeyRef:
                name: app-secret
                key: DB_USER

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: DB_PASSWORD


