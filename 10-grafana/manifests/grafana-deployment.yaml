apiVersion: apps/v1
kind: Deployment

metadata:
  name: grafana
  namespace: monitoring-lab

spec:
  replicas: 1

  selector:
    matchLabels:
      app: grafana

  template:
    metadata:
      labels:
        app: grafana

    spec:
      containers:

      - name: grafana

        image: grafana/grafana:12.1.0

        ports:
        - containerPort: 3000
