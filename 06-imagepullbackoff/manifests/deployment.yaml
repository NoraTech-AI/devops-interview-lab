apiVersion: apps/v1
kind: Deployment

metadata:
  name: broken-app
  namespace: image-lab

spec:
  replicas: 1

  selector:
    matchLabels:
      app: broken-app
  
  template:
    metadata:
      labels:
        app: broken-app

    spec:
      containers:
      - name: broken-app
        image: nginx:1.29
