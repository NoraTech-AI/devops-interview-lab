apiVersion: apps/v1
kind: Deployment
metadata:
  name: crash-app
  namespace: crash-lab

spec:
  replicas: 1
  selector:
    matchLabels:
      app: crash-app

  template:
    metadata:
      labels:
        app: crash-app

    spec:
      containers:
      - name: crash-app
        image: busybox

        command: ["sleep", "3600"]
