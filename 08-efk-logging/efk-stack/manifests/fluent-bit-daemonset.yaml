apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit-efk
  namespace: logging-efk

spec:
  selector:
    matchLabels:
      app: fluent-bit-efk

  template:
    metadata:
      labels:
        app: fluent-bit-efk

    spec:
      containers:
      - name: fluent-bit
        image: fluent/fluent-bit:2.2
        volumeMounts:
        - name: varlog
          mountPath: /var/log
        - name: config
          mountPath: /fluent-bit/etc

      volumes:
      - name: varlog
        hostPath:
          path: /var/log
      - name: config
        configMap:
          name: fluent-bit-config-efk
