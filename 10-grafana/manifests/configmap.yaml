apiVersion: v1
kind: ConfigMap

metadata:
  name: prometheus-config
  namespace: monitoring-lab

data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    rule_files:
      - /etc/prometheus/rules/alert.rules.yml

    scrape_configs:

    - job_name: prometheus
      static_configs:
      - targets:
        - localhost:9090

    - job_name: nginx
      static_configs:
      - targets:
        - nginx-service:80

    - job_name: nginx-exporter
      static_configs:
      - targets:
        - nginx-exporter:9113
