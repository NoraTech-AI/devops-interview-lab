apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-app
  namespace: rollout-lab

spec:
  replicas: 3

  selector:
    matchLabels:
      app: nginx-app

  template:
    metadata:
      labels:
        app: nginx-app

    spec:
      containers:
      - name: nginx
        image: nginx:1.30
        ports:
        - containerPort: 80
