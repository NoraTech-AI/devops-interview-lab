groups:
- name: nginx-alerts
  rules:

  - alert: NginxDown
    expr: up{job="nginx-exporter"} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "Nginx exporter is down"
      description: "Nginx exporter has been unreachable for more than 1 minute"

  - alert: PrometheusDown
    expr: up{job="prometheus"} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "Prometheus is down"
      description: "Prometheus target is not responding"
