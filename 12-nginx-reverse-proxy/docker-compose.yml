version: "3.8"

services:

  app:
    build: .
    container_name: flask-app
    ports:
      - "5000:5000"

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
